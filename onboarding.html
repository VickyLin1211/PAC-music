<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Complete Your Profile | PAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5ecd9;
      color: #111;
    }

    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
    }

    .brand {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      line-height: 1;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-right {
      justify-content: flex-end;
    }

    .nav-left a,
    .nav-right a {
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    .card {
      background: rgba(255,255,255,0.78);
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.05);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      margin: 0 0 10px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.7;
      font-size: 15px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin: 24px 0 12px;
      color: #333;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .input-group input,
    .input-group textarea,
    .input-group select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: white;
    }

    .input-group textarea {
      min-height: 110px;
      resize: vertical;
    }

    .input-group input:focus,
    .input-group textarea:focus,
    .input-group select:focus {
      outline: none;
      border: 1px solid black;
    }

    .save-button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
      margin-top: 10px;
    }

    .save-button:hover {
      background: #333;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .brand {
        font-size: 42px;
      }

      nav {
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="index.html">Home</a>
    </div>

    <div class="brand">PAC</div>

    <div class="nav-right">
      <a href="about.html">About</a>
      <a href="courses.html">Courses</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h1>Complete Your Profile</h1>
      <p class="subtitle">Tell us a little more so PAC can personalize your experience.</p>

      <form id="onboardingForm">
        <div class="section-title">Basic Information</div>

        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input id="fullName" type="text" placeholder="Enter your full name" />
        </div>

        <div class="input-group">
          <label for="bio">Short Bio</label>
          <textarea id="bio" placeholder="Tell us a little about yourself"></textarea>
        </div>

        <!-- Student Fields -->
        <div id="studentFields" class="hidden">
          <div class="section-title">Student Information</div>

          <div class="input-group">
            <label for="instrument">Main Instrument / Subject</label>
            <input id="instrument" type="text" placeholder="Piano, Voice, Guitar..." />
          </div>

          <div class="input-group">
            <label for="level">Current Level</label>
            <select id="level">
              <option value="">Select your level</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>

          <div class="input-group">
            <label for="goal">Learning Goal</label>
            <input id="goal" type="text" placeholder="Audition prep, hobby, songwriting..." />
          </div>
        </div>

        <!-- Instructor Fields -->
        <div id="instructorFields" class="hidden">
          <div class="section-title">Instructor Information</div>

          <div class="input-group">
            <label for="specialty">Teaching Specialty</label>
            <input id="specialty" type="text" placeholder="Piano, Composition, Voice..." />
          </div>

          <div class="input-group">
            <label for="experience">Years of Experience</label>
            <input id="experience" type="text" placeholder="e.g. 5 years" />
          </div>

          <div class="input-group">
            <label for="education">Education / Certification</label>
            <input id="education" type="text" placeholder="School, degree, certifications..." />
          </div>

          <div class="input-group">
            <label for="language">Teaching Language</label>
            <input id="language" type="text" placeholder="English, Spanish, Mandarin..." />
          </div>
        </div>

        <button type="submit" class="save-button">Save and Continue</button>
      </form>
    </div>
  </div>

  <script>
    function getCurrentUser() {
      return {
        name: localStorage.getItem("currentUserName"),
        role: localStorage.getItem("currentUserRole"),
        email: localStorage.getItem("currentUserEmail")
      };
    }

    function getProfiles() {
      return JSON.parse(localStorage.getItem("userProfiles")) || [];
    }

    function showRoleFields() {
      const user = getCurrentUser();

      if (!user.role || !user.email) {
        window.location.href = "login.html";
        return;
      }

      const studentFields = document.getElementById("studentFields");
      const instructorFields = document.getElementById("instructorFields");

      if (user.role === "student") {
        studentFields.classList.remove("hidden");
        instructorFields.classList.add("hidden");
      } else if (user.role === "instructor") {
        instructorFields.classList.remove("hidden");
        studentFields.classList.add("hidden");
      }

      document.getElementById("fullName").value = user.name || "";
    }

    function saveProfile(event) {
      event.preventDefault();

      const user = getCurrentUser();

      if (!user.role || !user.email) {
        window.location.href = "login.html";
        return;
      }

      const profiles = getProfiles();
      const existingIndex = profiles.findIndex(profile => profile.email === user.email);

      const profileData = {
        email: user.email,
        role: user.role,
        fullName: document.getElementById("fullName").value.trim(),
        bio: document.getElementById("bio").value.trim()
      };

      if (user.role === "student") {
        profileData.instrument = document.getElementById("instrument").value.trim();
        profileData.level = document.getElementById("level").value;
        profileData.goal = document.getElementById("goal").value.trim();
      }

      if (user.role === "instructor") {
        profileData.specialty = document.getElementById("specialty").value.trim();
        profileData.experience = document.getElementById("experience").value.trim();
        profileData.education = document.getElementById("education").value.trim();
        profileData.language = document.getElementById("language").value.trim();
      }

      if (existingIndex >= 0) {
        profiles[existingIndex] = profileData;
      } else {
        profiles.push(profileData);
      }

      localStorage.setItem("userProfiles", JSON.stringify(profiles));

      if (user.role === "student") {
        window.location.href = "students.html";
      } else {
        window.location.href = "teachers.html";
      }
    }

    showRoleFields();
    document.getElementById("onboardingForm").addEventListener("submit", saveProfile);
  </script>
</body>
</html>
