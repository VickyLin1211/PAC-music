<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students | PAC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f5ecd9;
  color: #111;
}

/* NAV */
nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 40px;
}

.brand {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 60px;
}

.nav-right {
  display: flex;
  justify-content: flex-end;
  gap: 24px;
}

.nav-right a {
  text-decoration: none;
  color: black;
  font-size: 14px;
}

.nav-right a:hover {
  opacity: 0.6;
}

/* MAIN */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 24px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  margin-bottom: 30px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.7);
  padding: 24px;
  border-radius: 16px;
  margin-bottom: 20px;
}

.card h3 {
  margin: 0 0 10px;
}

.card p {
  color: #555;
  font-size: 14px;
}

.logout {
  margin-top: 30px;
  display: inline-block;
  font-size: 14px;
  cursor: pointer;
  color: #444;
}

.logout:hover {
  opacity: 0.6;
}
</style>
</head>

<body>

<nav>
  <div></div>

  <div class="brand">PAC</div>

  <div class="nav-right">
    <a href="courses.html">Courses</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<div class="container">

  <!-- 🔥 Welcome text -->
  <h1 id="welcomeText">Welcome back</h1>

  <p class="subtitle">
    Continue your learning journey on PAC.
  </p>

  <div class="card">
    <h3>Your Courses</h3>
    <p>Browse and continue your enrolled courses.</p>
  </div>

  <div class="card">
    <h3>Recommended</h3>
    <p>Explore new courses based on your interests.</p>
  </div>

  <div class="card">
    <h3>Your Progress</h3>
    <p>Track your learning and stay consistent.</p>
  </div>

  <!-- Logout -->
  <div class="logout" onclick="logout()">Logout</div>

</div>

<script>
// 🔥 顯示名字
const name = localStorage.getItem("userName");

if (name) {
  document.getElementById("welcomeText").innerText = "Welcome back, " + name;
}

// 🔥 logout 功能
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
