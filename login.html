<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | PAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5ecd9;
      color: #111;
    }

    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
    }

    .brand {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      line-height: 1;
    }

    .nav-left a,
    .nav-right a {
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-left a:hover,
    .nav-right a:hover {
      opacity: 0.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    .login-card {
      max-width: 420px;
      margin: 40px auto 0;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .login-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      margin: 0 0 10px 0;
      text-align: center;
    }

    .subtitle {
      color: #666;
      font-size: 15px;
      text-align: center;
      margin: 0 0 30px 0;
      line-height: 1.7;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #333;
    }

    .input-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      background: white;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border: 1px solid black;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 14px 0 22px;
      font-size: 13px;
      color: #555;
    }

    .row a {
      text-decoration: none;
      color: #333;
    }

    .row a:hover {
      opacity: 0.7;
    }

    .login-button {
      width: 100%;
      padding: 13px 18px;
      border: none;
      border-radius: 999px;
      background: black;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .login-button:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .footer-links {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: #666;
      line-height: 1.8;
    }

    .footer-links a {
      text-decoration: none;
      color: black;
    }

    .footer-links a:hover {
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .brand {
        font-size: 42px;
      }

      .nav-right {
        gap: 14px;
      }

      nav {
        padding: 20px 24px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="index.html">← Back to Home</a>
    </div>

    <div class="brand">PAC</div>

    <div class="nav-right">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="courses.html">Courses</a>
      <a href="#" onclick="goToLoginOrDashboard()">Login</a>
    </div>
  </nav>

  <div class="container">
    <div class="login-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Login to continue your journey with PAC.</p>

      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter your password">
      </div>

      <div class="row">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="login-button" onclick="handleLogin()">Login</button>

      <div class="footer-links">
        Don’t have an account? <a href="signup.html">Create account</a><br>
        Not ready yet? <a href="index.html">Return to Home</a>
      </div>
    </div>
  </div>

<script>
function getCurrentUser() {
  return {
    name: localStorage.getItem("currentUserName"),
    role: localStorage.getItem("currentUserRole"),
    email: localStorage.getItem("currentUserEmail")
  };
}

function goToLoginOrDashboard() {
  const user = getCurrentUser();

  if (!user.role) {
    window.location.href = "login.html";
    return;
  }

  if (user.role === "student") {
    window.location.href = "students.html";
  } else if (user.role === "instructor") {
    window.location.href = "teachers.html";
  } else {
    window.location.href = "login.html";
  }
}

const user = getCurrentUser();
if (user.role === "student") {
  window.location.href = "students.html";
} else if (user.role === "instructor") {
  window.location.href = "teachers.html";
}

function handleLogin() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  const accounts = JSON.parse(localStorage.getItem("accounts")) || [];

  const matchedAccount = accounts.find(account =>
    account.email === email && account.password === password
  );

  if (!matchedAccount) {
    alert("Invalid email or password.");
    return;
  }

  // Save current session
  localStorage.setItem("currentUserName", matchedAccount.name);
  localStorage.setItem("currentUserRole", matchedAccount.role);
  localStorage.setItem("currentUserEmail", matchedAccount.email);

  // Check whether onboarding is completed
  const profiles = JSON.parse(localStorage.getItem("userProfiles")) || [];
  const existingProfile = profiles.find(profile => profile.email === matchedAccount.email);

  if (!existingProfile) {
    window.location.href = "onboarding.html";
    return;
  }

  if (matchedAccount.role === "student") {
    window.location.href = "students.html";
  } else if (matchedAccount.role === "instructor") {
    window.location.href = "teachers.html";
  } else {
    alert("This account has an invalid role.");
  }
}
</script>

</body>
</html>
