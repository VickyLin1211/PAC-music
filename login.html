<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PAC Login</title>
  <style>

    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #f7f5f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      padding: 50px 40px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin: 10px 0 20px;
    }

    .row a {
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: black;
      color: white;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background: #333;
    }

    .divider {
      margin: 20px 0;
      font-size: 12px;
      color: #aaa;
    }

    .role {
      text-align: left;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .role label {
      margin-right: 10px;
    }

    .signup {
      font-size: 13px;
    }

    .signup a {
      text-decoration: none;
      font-weight: bold;
      color: black;
    }

  </style>
</head>
<body>

  <div class="login-container">

    <h1>Welcome back</h1>
    <p>Login to continue your music journey</p>

    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password">
    </div>

    <div class="row">
      <label>
        <input type="checkbox"> Remember me
      </label>
      <a href="#">Forgot password?</a>
    </div>

    <button>Login</button>

    <div class="divider">Login as</div>

    <div class="role">
      <label><input type="radio" name="role"> Student</label>
      <label><input type="radio" name="role"> Instructor</label>
    </div>

    <div class="signup">
      Don’t have an account? <a href="#">Sign up</a>
    </div>

  </div>

</body>
</html>
