<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5ecd9;
      color: #111;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    .nav-links a:hover {
      opacity: 0.6;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero img {
      height: 90px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      max-width: 800px;
      margin: auto;
      line-height: 1.1;
    }

    .subtitle {
      color: #666;
      margin-top: 20px;
      font-size: 18px;
    }

    .button {
      margin-top: 30px;
      padding: 12px 22px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .button:hover {
      background: #333;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">
      PAC
      <img src="logo.png" style="height:28px;">
    </div>

    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Students</a>
      <a href="#">Login</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">

    <img src="logo.png">

    <h1>
      Global music education, without borders.
    </h1>

    <p class="subtitle">
      Connecting serious music students with international teachers and real opportunities.
    </p>

    <button class="button">
      Join the Pilot
    </button>

  </div>

</body>
</html>
