<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5ecd9;
      color: #111;
    }

    /* NAVBAR */
    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
    }

    /* 中間 PAC */
    .center-logo {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* 右邊選單 */
    .nav-right {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      font-size: 14px;
    }

    .nav-right a {
      text-decoration: none;
      color: black;
    }

    .nav-right a:hover {
      opacity: 0.6;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero img {
      height: 220px; /* 🔥 超大 logo */
      margin-bottom: 40px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      max-width: 800px;
      margin: auto;
      line-height: 1.1;
    }

    .subtitle {
      color: #666;
      margin-top: 20px;
      font-size: 18px;
    }

    .button {
      margin-top: 30px;
      padding: 14px 26px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .button:hover {
      background: #333;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div></div>

    <div class="center-logo">PAC</div>

    <div class="nav-right">
      <a href="#">About</a>
      <a href="#">Students</a>
      <a href="#">Teachers</a>
      <a href="#">Courses</a>
      <a href="#">Login</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">

    <img src="logo.png" alt="PAC logo">

    <h1>
      Global music education, without borders.
    </h1>

    <p class="subtitle">
      Connecting serious music students with international teachers, perspectives, and real opportunities.
    </p>

    <button class="button">
      Join the Pilot
    </button>

  </div>

</body>
</html>
