<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAC</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #f5ecd9;
  color: #111;
}

/* NAVBAR */
nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px 40px;
}

.brand {
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  letter-spacing: 4px;
}

.nav-right {
  display: flex;
  justify-content: flex-end;
  gap: 24px;
  font-size: 14px;
}

.nav-right a {
  text-decoration: none;
  color: black;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero img {
  height: 180px;   /* 重點：不要太大 */
  margin-bottom: 40px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 58px;
  line-height: 1.1;
  max-width: 800px;
  margin: auto;
}

.subtitle {
  color: #666;
  margin-top: 20px;
}

.button {
  margin-top: 30px;
  padding: 12px 24px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
}

</style>
</head>

<body>

<nav>
  <div></div>

  <div class="brand">PAC</div>

  <div class="nav-right">
    <a href="#">About</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
    <a href="#">Courses</a>
    <a href="#">Login</a>
  </div>
</nav>

<div class="hero">
  <img src="logo.png">

  <h1>
    Global music education,<br>
    without borders.
  </h1>

  <p class="subtitle">
    Connecting serious music students with international teachers and real opportunities.
  </p>

  <button class="button">Join the Pilot</button>
</div>

</body>
</html>
