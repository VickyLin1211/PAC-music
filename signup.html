<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account | PAC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5ecd9;
      color: #111;
    }

    nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 40px;
    }

    .brand {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      line-height: 1;
    }

    .nav-left a,
    .nav-right a,
    .account-trigger {
      text-decoration: none;
      color: black;
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      padding: 0;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      position: relative;
    }

    .nav-left a:hover,
    .nav-right a:hover,
    .account-trigger:hover {
      opacity: 0.6;
    }

    .account-menu {
      position: relative;
    }

    .account-dropdown {
      display: none;
      position: absolute;
      top: 28px;
      right: 0;
      min-width: 170px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 10px 0;
      z-index: 100;
    }

    .account-dropdown.show {
      display: block;
    }

    .account-dropdown a,
    .account-dropdown button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: left;
      padding: 10px 16px;
      font-size: 14px;
      color: #111;
      background: none;
      border: none;
      text-decoration: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    .account-dropdown a:hover,
    .account-dropdown button:hover {
      background: rgba(0,0,0,0.04);
      opacity: 1;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }

    .signup-card {
      max-width: 460px;
      margin: 40px auto 0;
      background: rgba(255,255,255,0.72);
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .signup-card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 44px;
      text-align: center;
      margin: 0 0 10px 0;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.7;
      font-size: 15px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }

    .input-group input:focus {
      outline: none;
      border: 1px solid black;
    }

    .role-options {
      margin: 20px 0;
      font-size: 14px;
      color: #444;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .signup-button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .signup-button:hover {
      background: #333;
    }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      color: #666;
      line-height: 1.8;
      font-size: 14px;
    }

    .footer-links a {
      text-decoration: none;
      color: black;
    }

    .footer-links a:hover {
      opacity: 0.7;
    }

    @media (max-width: 900px) {
      .brand {
        font-size: 42px;
      }

      .nav-right {
        gap: 14px;
      }

      nav {
        padding: 20px 24px;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="nav-left">
      <a href="login.html">← Back to Login</a>
    </div>

    <div class="brand">PAC</div>

    <div class="nav-right">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="courses.html">Courses</a>

      <div class="account-menu">
        <button id="accountTrigger" class="account-trigger" type="button" onclick="handleAccountClick(event)">Login</button>

        <div id="accountDropdown" class="account-dropdown">
          <a href="#" onclick="goToDashboard(event)">My Dashboard</a>
          <button type="button" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="signup-card">
      <h1>Create Account</h1>
      <p class="subtitle">Start your journey with PAC.</p>

      <div class="input-group">
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Enter your name" />
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter your email" />
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Create a password" />
      </div>

      <div class="role-options">
        <label><input type="radio" name="role" value="student" /> Student</label>
        <label><input type="radio" name="role" value="instructor" /> Instructor</label>
      </div>

      <button type="button" class="signup-button" onclick="handleSignup()">Create Account</button>

      <div class="footer-links">
        Already have an account? <a href="login.html">Login</a><br />
        Not ready yet? <a href="index.html">Return to Home</a>
      </div>
    </div>
  </div>

  <script>
    function getCurrentUser() {
      return {
        name: localStorage.getItem("currentUserName"),
        role: localStorage.getItem("currentUserRole"),
        email: localStorage.getItem("currentUserEmail")
      };
    }

    function isLoggedIn() {
      const user = getCurrentUser();
      return !!(user.role && user.email);
    }

    function getProfiles() {
      return JSON.parse(localStorage.getItem("userProfiles")) || [];
    }

    function goToLoginOrDashboard() {
      const user = getCurrentUser();

      if (!user.role || !user.email) {
        window.location.href = "login.html";
        return;
      }

      const profiles = getProfiles();
      const existingProfile = profiles.find(profile => profile.email === user.email);

      if (!existingProfile) {
        window.location.href = "onboarding.html";
        return;
      }

      if (user.role === "student") {
        window.location.href = "students.html";
      } else if (user.role === "instructor") {
        window.location.href = "teachers.html";
      } else {
        window.location.href = "login.html";
      }
    }

    function goToDashboard(event) {
      event.preventDefault();
      goToLoginOrDashboard();
    }

    function logout() {
      localStorage.removeItem("currentUserName");
      localStorage.removeItem("currentUserRole");
      localStorage.removeItem("currentUserEmail");
      closeAccountDropdown();
      window.location.href = "index.html";
    }

    function updateAccountUI() {
      const trigger = document.getElementById("accountTrigger");
      const dropdown = document.getElementById("accountDropdown");

      if (isLoggedIn()) {
        trigger.textContent = "Profile";
      } else {
        trigger.textContent = "Login";
        dropdown.classList.remove("show");
      }
    }

    function handleAccountClick(event) {
      event.preventDefault();

      if (!isLoggedIn()) {
        window.location.href = "login.html";
        return;
      }

      const dropdown = document.getElementById("accountDropdown");
      dropdown.classList.toggle("show");
    }

    function closeAccountDropdown() {
      const dropdown = document.getElementById("accountDropdown");
      dropdown.classList.remove("show");
    }

    document.addEventListener("click", function(event) {
      const menu = document.querySelector(".account-menu");
      if (!menu.contains(event.target)) {
        closeAccountDropdown();
      }
    });

    (function checkExistingSession() {
      const user = getCurrentUser();

      if (!user.role || !user.email) return;

      const profiles = getProfiles();
      const existingProfile = profiles.find(profile => profile.email === user.email);

      if (!existingProfile) {
        window.location.href = "onboarding.html";
        return;
      }

      if (user.role === "student") {
        window.location.href = "students.html";
      } else if (user.role === "instructor") {
        window.location.href = "teachers.html";
      }
    })();

    function handleSignup() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const role = document.querySelector('input[name="role"]:checked');

      if (!name || !email || !password || !role) {
        alert("Please complete all fields.");
        return;
      }

      const accounts = JSON.parse(localStorage.getItem("accounts")) || [];
      const existingAccount = accounts.find(account => account.email === email);

      if (existingAccount) {
        alert("This email is already registered.");
        return;
      }

      const newAccount = {
        name,
        email,
        password,
        role: role.value
      };

      accounts.push(newAccount);
      localStorage.setItem("accounts", JSON.stringify(accounts));

      localStorage.setItem("currentUserName", name);
      localStorage.setItem("currentUserRole", role.value);
      localStorage.setItem("currentUserEmail", email);

      window.location.href = "onboarding.html";
    }

    updateAccountUI();
  </script>
</body>
</html>
